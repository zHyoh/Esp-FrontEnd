<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        article {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            background-size: cover;
            background-position: center;
        }

        div {
            background-color: #01050880;
            max-width: 512px;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 48px;
        }

        p {
            color: #CBD5E1;
            font-size: 18px;
        }

        a {
            padding: 16px 32px;
            border-radius: 24px;
            background-color: #7C3BED;
            color: white;
            font-size: 16px;
            text-decoration: none;
        }

        .image {
            position: absolute;
            z-index: -1;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <main>
        <article>
            <img src="https://moewalls.com/wp-content/uploads/2023/01/tatsumaki-x-fubuki-one-punch-man-thumb-1.jpg"
                alt="Tatsumaki and Fubuki from One Punch Man" width="1920" height="1080" class="image">
            <div>
                <h1>Anime Gallery</h1>
                <p>
                    Discover popular anime series. Explore a curated collection of the finest animation, from timeless
                    classics to
                    the latest trending masterpieces.
                </p>
                <a href="#">
                    Explore Anime
                </a>
            </div>
        </article>
    </main>
</body>

</html>
