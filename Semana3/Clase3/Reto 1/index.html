<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <h1>Checkout</h1>
        <label for="">Payment Method</label>
        <select name="" id="">
            <option value="1">Visa Ending 4566</option>
            <option value="2">American Express Ending in 9122</option>
            <option value="3">Discover Ending in 9865</option>
        </select>
        <br>
        <br>
        <div style="border:1px solid #0000005b; padding:0 10px;">
            <h2>Shipping Method</h2>
            <input type="radio" name="shipping" id="" value="1">
            <label for="standard">FREE - 2 Day Shipping</label><br>
            <input type="radio" name="shipping" id="" value="2">
            <label for="express">Standard Shipping (4 - 5 Business Days)</label><br>
            <input type="radio" name="shipping" id="" value="3">
            <label for="overnight">FREE - no Rush Shipping (5 Business Days)</label>
        </div>
        <br>
        <div>
            <label for="giff">This is a giff</label>
            <input type="checkbox" name="giff" id="">
            <br>
            <button type="submit">Place Your Order</button>
        </div>
    </form>
</body>
</html>
