<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Gallery</title>
    <style>
        body{
            margin:0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        article{
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://upload-os-bbs.hoyolab.com/upload/2021/08/26/5481824/aa0b45e10b9965ec6b7a2c732af53024_8748354073441588777.png?x-oss-process=image%2Fresize%2Cs_1000%2Fauto-orient%2C0%2Finterlace%2C1%2Fformat%2Cwebp%2Fquality%2Cq_70');
            background-size: cover;
            background-position: center;
            min-height: 25vh;
        }
        div{
            background-color: #01050880;
            max-width: 514px;
            text-align: center;
            color:white;
        }
        h1{
            font-size:48px;
        }
        p{
            font-size: 18px;
            color:#cdcdcd;
        }
        a{
            background-color: #7c3bed;
            color:white;
            border-radius: 32px;
            text-decoration: none;
            font-size: 16px;
            padding:16px 32px;
            display: inline-block;
            margin:0 0 32px 0;
        }
    </style>
</head>

<body>
    <main>
        <article>
            <div>
                <h1>Anime Gallery</h1>
                <p>
                    Discover popular anime series. Explore a curated collection of the finest animation, from timeless
                    classics to
                    the latest trending masterpieces.
                </p>
                <a href="#">
                    Explore Anime
                </a>
            </div>
        </article>
    </main>
</body>

</html>
